services:
  postgres:
    image: postgres:16
    container_name: opero-postgres
    environment:
      POSTGRES_USER: opero
      POSTGRES_PASSWORD: opero
      # Creates the shared control-plane database on first startup.
      # Tenant databases are created per tenant at provision time (M1).
      POSTGRES_DB: opero_control
    ports:
      - "5432:5432"
    volumes:
      - opero_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opero -d opero_control"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: opero-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: opero
      MINIO_ROOT_PASSWORD: opero-secret
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # web console
    volumes:
      - opero_miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-shot: waits for MinIO, creates the media bucket, then exits.
  createbuckets:
    image: minio/mc
    container_name: opero-createbuckets
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 opero opero-secret &&
      mc mb --ignore-existing local/opero-media &&
      echo 'bucket opero-media ready'
      "

volumes:
  opero_pgdata:
  opero_miniodata:
