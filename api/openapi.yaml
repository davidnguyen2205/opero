openapi: 3.0.3
info:
  title: Opero API
  version: 0.1.0
  description: >
    Opero people-operations API. This spec is the single source of truth —
    every operation is defined here before it is implemented. Operational
    routes like /health are infrastructure and intentionally not part of the
    contract.
servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: auth
    description: Authentication and tenant onboarding (control-plane operations).
  - name: platform
    description: Super Admin control-plane operations for Opero staff.
  - name: identity
    description: People and org core — employees and departments (tenant data).
  - name: roster
    description: Scheduling — shifts and locations (tenant data).
  - name: attendance
    description: Field attendance — check-in/out, offline-tolerant via a client-supplied id (tenant data).
  - name: leave
    description: Time-off requests and per-employee leave balances (tenant data).
  - name: tours
    description: Tour catalog and management — the experiences a tenant offers (tenant data).

paths:
  /auth/signup:
    post:
      operationId: signup
      tags: [auth]
      summary: Sign up a new tenant and its first admin user.
      description: >
        Creates a new tenant, provisions its isolated database (schema +
        seed defaults), and creates the first admin user. Returns an access
        token for the new admin. This is a control-plane operation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '201':
          description: Tenant and admin user created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: A tenant with this slug, or admin email, already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in to a tenant.
      description: >
        Authenticates a user within a specific tenant (identified by slug,
        since email is unique only per tenant) and returns an access token.
        This is a control-plane operation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get the currently authenticated user.
      description: >
        Returns the authenticated user and their tenant, resolved from the
        bearer token. Requires authentication.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The current user and tenant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /platform/auth/login:
    post:
      operationId: platformLogin
      tags: [platform]
      summary: Log in as an Opero platform user.
      description: >
        Authenticates an Opero staff user from the control-plane platform_users
        table and returns a platform JWT. This token has kind=platform and does
        not select a tenant database.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlatformLoginRequest'
      responses:
        '200':
          description: Authenticated platform user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformAuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /platform/auth/me:
    get:
      operationId: getCurrentPlatformUser
      tags: [platform]
      summary: Get the currently authenticated platform user.
      description: Returns the Opero staff user represented by the platform JWT.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The current platform user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentPlatformUserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /platform/tenants:
    get:
      operationId: platformListTenants
      tags: [platform]
      summary: List tenants.
      description: Lists all tenants from the control-plane registry for Super Admin use.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Tenant registry entries.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PlatformTenant'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /platform/tenants/{id}:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    get:
      operationId: platformGetTenant
      tags: [platform]
      summary: Get a tenant.
      description: Returns one control-plane tenant registry entry.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Tenant registry entry.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformTenant'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: platformUpdateTenant
      tags: [platform]
      summary: Update tenant platform state.
      description: Updates tenant name, status, or plan from the platform console and writes an audit event.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlatformUpdateTenantRequest'
      responses:
        '200':
          description: Updated tenant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformTenant'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /platform/users:
    get:
      operationId: platformListUsers
      tags: [platform]
      summary: List tenant login users.
      description: Lists tenant-scoped login users across the control plane.
      security:
        - bearerAuth: []
      parameters:
        - name: tenant_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: role
          in: query
          required: false
          schema:
            type: string
            enum: [admin, manager, employee]
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [active, disabled]
      responses:
        '200':
          description: Tenant login users.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PlatformTenantUser'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /platform/users/{id}:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    patch:
      operationId: platformUpdateUser
      tags: [platform]
      summary: Update a tenant login user.
      description: Enables or disables a tenant login user and writes an audit event.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlatformUpdateUserRequest'
      responses:
        '200':
          description: Updated tenant login user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /platform/subscriptions:
    get:
      operationId: platformListSubscriptions
      tags: [platform]
      summary: List subscriptions.
      description: Lists subscription stubs across tenants.
      security:
        - bearerAuth: []
      parameters:
        - name: tenant_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: plan
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Subscriptions.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PlatformSubscription'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /platform/subscriptions/{id}:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    patch:
      operationId: platformUpdateSubscription
      tags: [platform]
      summary: Update a subscription.
      description: Updates manual subscription plan/status and writes an audit event.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlatformUpdateSubscriptionRequest'
      responses:
        '200':
          description: Updated subscription.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformSubscription'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /platform/system/health:
    get:
      operationId: platformGetSystemHealth
      tags: [platform]
      summary: Get platform health summary.
      description: Returns control-plane health and tenant counts for the Super Admin console.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Platform health summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformSystemHealth'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /platform/audit-events:
    get:
      operationId: platformListAuditEvents
      tags: [platform]
      summary: List Super Admin audit events.
      description: Lists audited platform actions, newest first.
      security:
        - bearerAuth: []
      parameters:
        - name: tenant_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: actor_platform_user_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: action
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 100
      responses:
        '200':
          description: Audit events.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SuperAdminAuditEvent'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /departments:
    get:
      operationId: listDepartments
      tags: [identity]
      summary: List departments.
      description: Returns all departments for the tenant. Org hierarchy is expressed via each department's nullable parent_id.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The tenant's departments.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Department'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createDepartment
      tags: [identity]
      summary: Create a department.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDepartmentRequest'
      responses:
        '201':
          description: Department created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Department'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /departments/{id}:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    get:
      operationId: getDepartment
      tags: [identity]
      summary: Get a department by id.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The department.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Department'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateDepartment
      tags: [identity]
      summary: Update a department.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDepartmentRequest'
      responses:
        '200':
          description: Updated department.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Department'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteDepartment
      tags: [identity]
      summary: Delete a department.
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Deleted.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /employees:
    get:
      operationId: listEmployees
      tags: [identity]
      summary: List employees.
      description: Returns the tenant's employees, optionally filtered by department or status.
      security:
        - bearerAuth: []
      parameters:
        - name: department_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [active, inactive]
      responses:
        '200':
          description: The tenant's employees.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Employee'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createEmployee
      tags: [identity]
      summary: Create an employee.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEmployeeRequest'
      responses:
        '201':
          description: Employee created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /employees/{id}:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    get:
      operationId: getEmployee
      tags: [identity]
      summary: Get an employee by id.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The employee.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateEmployee
      tags: [identity]
      summary: Update an employee.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEmployeeRequest'
      responses:
        '200':
          description: Updated employee.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteEmployee
      tags: [identity]
      summary: Delete an employee.
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Deleted.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /roles:
    get:
      operationId: listRoles
      tags: [identity]
      summary: List roles.
      description: Returns the tenant's roles. Each role carries a set of permission keys (not yet enforced in v1).
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The tenant's roles.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Role'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createRole
      tags: [identity]
      summary: Create a role.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoleRequest'
      responses:
        '201':
          description: Role created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: A role with this name already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /roles/{id}:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    get:
      operationId: getRole
      tags: [identity]
      summary: Get a role by id.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The role.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateRole
      tags: [identity]
      summary: Update a role.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoleRequest'
      responses:
        '200':
          description: Updated role.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteRole
      tags: [identity]
      summary: Delete a role.
      description: Deletes a role. Employees assigned to it have their role cleared (set to null).
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Deleted.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /locations:
    get:
      operationId: listLocations
      tags: [roster]
      summary: List locations.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The tenant's locations.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Location'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createLocation
      tags: [roster]
      summary: Create a location.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLocationRequest'
      responses:
        '201':
          description: Location created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Location'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /locations/{id}:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    get:
      operationId: getLocation
      tags: [roster]
      summary: Get a location by id.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The location.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Location'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateLocation
      tags: [roster]
      summary: Update a location.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLocationRequest'
      responses:
        '200':
          description: Updated location.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Location'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteLocation
      tags: [roster]
      summary: Delete a location.
      description: Deletes a location. Shifts at it have their location cleared (set to null).
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Deleted.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /shifts:
    get:
      operationId: listShifts
      tags: [roster]
      summary: List shifts.
      description: >
        Lists shifts, optionally filtered by employee, status, and a
        [from, to) window on the shift start time.
      security:
        - bearerAuth: []
      parameters:
        - name: employee_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [draft, published]
        - name: from
          in: query
          required: false
          description: Inclusive lower bound on starts_at (ISO-8601).
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          description: Exclusive upper bound on starts_at (ISO-8601).
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Matching shifts.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Shift'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createShift
      tags: [roster]
      summary: Create a shift (starts as a draft).
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateShiftRequest'
      responses:
        '201':
          description: Shift created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shift'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /shifts/{id}:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    get:
      operationId: getShift
      tags: [roster]
      summary: Get a shift by id.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The shift.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shift'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateShift
      tags: [roster]
      summary: Update a shift.
      description: Updates shift fields. Status transitions go through the publish endpoint, not here.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateShiftRequest'
      responses:
        '200':
          description: Updated shift.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shift'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteShift
      tags: [roster]
      summary: Delete a shift.
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Deleted.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /shifts/{id}/publish:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    post:
      operationId: publishShift
      tags: [roster]
      summary: Publish a shift.
      description: Transitions a shift to published, making it visible to the assigned staff. Idempotent.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The published shift.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shift'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /employees/{id}/login:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    post:
      operationId: createEmployeeLogin
      tags: [identity]
      summary: Provision a login for an employee.
      description: >
        Creates a control-plane user account for the employee and links it
        (employees.user_id), so the employee can authenticate (e.g. field staff
        on the mobile app). Fails if the employee already has a login or the
        email is already taken in this tenant.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLoginRequest'
      responses:
        '201':
          description: Login created and linked to the employee.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: The employee already has a login, or the email is taken.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /attendance:
    get:
      operationId: listAttendance
      tags: [attendance]
      summary: List attendance records.
      description: Lists attendance records, optionally filtered by employee, status, and a [from, to) window on check-in time.
      security:
        - bearerAuth: []
      parameters:
        - name: employee_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [checked_in, checked_out, missed, on_break]
        - name: from
          in: query
          required: false
          description: Inclusive lower bound on check_in_at (ISO-8601).
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          description: Exclusive upper bound on check_in_at (ISO-8601).
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Matching attendance records.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AttendanceRecord'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /attendance/check-in:
    post:
      operationId: checkIn
      tags: [attendance]
      summary: Check in (field staff).
      description: >
        Records a check-in for the authenticated employee (resolved from the
        token). Idempotent on client_id: replaying the same client_id returns
        the existing record rather than creating a duplicate — this is what
        makes the offline mobile queue safe to replay.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckInRequest'
      responses:
        '200':
          description: Existing record returned (idempotent replay).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceRecord'
        '201':
          description: Checked in.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceRecord'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: The client_id is already in use by another employee.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /attendance/check-out:
    post:
      operationId: checkOut
      tags: [attendance]
      summary: Check out (field staff).
      description: >
        Records check-out against an existing attendance record identified by
        the same client_id used at check-in. Idempotent.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckOutRequest'
      responses:
        '200':
          description: Checked out (or already checked out — idempotent).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceRecord'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /attendance/break:
    post:
      operationId: setBreak
      tags: [attendance]
      summary: Start or end a break (field staff).
      description: >
        Toggles the break state of an open attendance record (identified by the
        same client_id used at check-in): on_break=true moves checked_in →
        on_break, on_break=false moves on_break → checked_in. Idempotent.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetBreakRequest'
      responses:
        '200':
          description: The updated attendance record.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceRecord'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /me/shifts:
    get:
      operationId: listMyShifts
      tags: [roster]
      summary: List the authenticated employee's own shifts.
      description: >
        Field-facing: returns shifts for the employee linked to the caller's
        login (resolved from the token), optionally filtered by status and a
        [from, to) window on start time. Returns an empty list if the caller has
        no linked employee record.
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [draft, published]
        - name: from
          in: query
          required: false
          description: Inclusive lower bound on starts_at (ISO-8601).
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          description: Exclusive upper bound on starts_at (ISO-8601).
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: The caller's shifts, ordered by start time.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Shift'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /live:
    get:
      operationId: getLiveView
      tags: [roster]
      summary: Manager live view — who is working now.
      description: >
        Published shifts whose start time falls in the window, each joined with
        the employee and their current attendance state. The window defaults to
        the current UTC day; clients should pass from/to computed in the user's
        local timezone for correct day boundaries (the server has no tenant
        timezone). Shifts that started before the window (e.g. overnight) are
        not included — the filter is on shift start time.
      security:
        - bearerAuth: []
      parameters:
        - name: from
          in: query
          required: false
          description: Inclusive lower bound on shift starts_at (ISO-8601). Defaults to start of the current UTC day.
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          description: Exclusive upper bound on shift starts_at (ISO-8601). Defaults to start of the next UTC day.
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Live view entries, ordered by shift start time.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LiveViewEntry'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /me/leave:
    get:
      operationId: listMyLeave
      tags: [leave]
      summary: List the authenticated employee's own leave requests.
      description: >
        Field-facing: leave requests for the employee linked to the caller's
        login (resolved from the token), newest first. Empty list if the caller
        has no linked employee record.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The caller's leave requests.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LeaveRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createMyLeave
      tags: [leave]
      summary: Submit a time-off request (field staff).
      description: >
        Creates a pending leave request for the employee linked to the caller's
        login. Managers review it via the /leave endpoints.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLeaveRequest'
      responses:
        '201':
          description: Leave request created (status pending).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaveRequest'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /me/leave/balance:
    get:
      operationId: getMyLeaveBalance
      tags: [leave]
      summary: The authenticated employee's leave balance for the current year.
      description: >
        Entitled days come from the employee's balance row (default applies when
        none is set); used days are computed from approved requests in the year.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The caller's leave balance.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaveBalance'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /leave:
    get:
      operationId: listLeave
      tags: [leave]
      summary: List leave requests (manager).
      description: All leave requests in the tenant, newest first, optionally filtered by status or employee.
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/LeaveStatus'
        - name: employee_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Leave requests.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LeaveRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /leave/{id}/approve:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    post:
      operationId: approveLeave
      tags: [leave]
      summary: Approve a leave request (manager).
      description: Marks a pending request approved and records the reviewing user and time. Idempotent on an already-approved request.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The updated leave request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaveRequest'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /leave/{id}/reject:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    post:
      operationId: rejectLeave
      tags: [leave]
      summary: Reject a leave request (manager).
      description: Marks a pending request rejected and records the reviewing user and time. Idempotent on an already-rejected request.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The updated leave request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaveRequest'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /tours:
    get:
      operationId: listTours
      tags: [tours]
      summary: List tours in the catalog.
      description: The tenant's tour catalog, optionally filtered by category or active flag. Ordered by name.
      security:
        - bearerAuth: []
      parameters:
        - name: category
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/TourCategory'
        - name: active
          in: query
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: The tenant's tours.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Tour'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createTour
      tags: [tours]
      summary: Create a tour.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTourRequest'
      responses:
        '201':
          description: Tour created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tour'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /tours/{id}:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    get:
      operationId: getTour
      tags: [tours]
      summary: Get a tour by id.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The tour.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tour'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateTour
      tags: [tours]
      summary: Update a tour.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTourRequest'
      responses:
        '200':
          description: Updated tour.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tour'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteTour
      tags: [tours]
      summary: Delete a tour.
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Deleted.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /me/stats:
    get:
      operationId: getMyStats
      tags: [attendance]
      summary: The authenticated employee's personal activity stats.
      description: >
        Computed (not stored) from the caller's shifts and attendance: shifts
        this calendar month, hours worked this week (from completed check-in/out
        pairs), on-time rate (check-in at or before the shift start over shifts
        with a check-in), and tenure in days (from hired_at). Read-only; this is
        a convenience aggregate for the field-app profile, not analytics infra.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The caller's stats. Zeroes when there is no linked employee or no data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MyStats'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /media:
    post:
      operationId: uploadMedia
      tags: [attendance]
      summary: Upload a media file (e.g. a check-in photo).
      description: >
        Uploads a file to object storage and returns a URL to reference it
        (e.g. as a check-in/out photo_url). The file is stored under the
        caller's tenant. Multipart form field name is "file".
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Uploaded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaUploadResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    BadRequest:
      description: The request was malformed or failed validation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication failed or is missing.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: The resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: A stable, machine-readable error code.
          example: invalid_credentials
        message:
          type: string
          description: A human-readable explanation.

    SignupRequest:
      type: object
      required: [company_name, admin_email, admin_password]
      properties:
        company_name:
          type: string
          minLength: 1
          maxLength: 200
          example: Saigon Tours Co.
        slug:
          type: string
          description: >
            URL/login-friendly tenant identifier. If omitted, derived from the
            company name. Lowercase letters, digits, and hyphens.
          pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$'
          minLength: 2
          maxLength: 63
          example: saigon-tours
        admin_full_name:
          type: string
          description: >
            Optional. Reserved for M2, when it will seed the admin's employee
            profile in the tenant database. Accepted but not yet persisted.
          minLength: 1
          maxLength: 200
        admin_email:
          type: string
          format: email
          maxLength: 320
        admin_password:
          type: string
          format: password
          minLength: 8
          maxLength: 128

    LoginRequest:
      type: object
      required: [tenant_slug, email, password]
      properties:
        tenant_slug:
          type: string
          example: saigon-tours
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    AuthResponse:
      type: object
      required: [token, token_type, expires_at, user, tenant]
      properties:
        token:
          type: string
          description: JWT access token.
        token_type:
          type: string
          enum: [Bearer]
        expires_at:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/UserSummary'
        tenant:
          $ref: '#/components/schemas/TenantSummary'

    CurrentUserResponse:
      type: object
      required: [user, tenant]
      properties:
        user:
          $ref: '#/components/schemas/UserSummary'
        tenant:
          $ref: '#/components/schemas/TenantSummary'

    PlatformLoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    PlatformAuthResponse:
      type: object
      required: [token, token_type, expires_at, user]
      properties:
        token:
          type: string
          description: JWT access token with kind=platform.
        token_type:
          type: string
          enum: [Bearer]
        expires_at:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/PlatformUserSummary'

    CurrentPlatformUserResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: '#/components/schemas/PlatformUserSummary'

    PlatformUserSummary:
      type: object
      required: [id, email, role, status]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          type: string
          enum: [super_admin, support, ops]
        status:
          type: string
          enum: [active, disabled]

    UserSummary:
      type: object
      required: [id, email, role, status]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, manager, employee]
        status:
          type: string
          enum: [active, disabled]

    TenantSummary:
      type: object
      required: [id, name, slug, status, plan]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        status:
          type: string
          enum: [active, suspended, provisioning]
        plan:
          type: string

    PlatformTenant:
      type: object
      required: [id, name, slug, db_name, status, plan, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        db_name:
          type: string
        status:
          type: string
          enum: [active, suspended, provisioning]
        plan:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PlatformUpdateTenantRequest:
      type: object
      description: PATCH semantics — only provided fields change.
      properties:
        name:
          type: string
        status:
          type: string
          enum: [active, suspended, provisioning]
        plan:
          type: string

    PlatformTenantUser:
      type: object
      required: [id, tenant_id, tenant_name, tenant_slug, email, role, status, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        tenant_name:
          type: string
        tenant_slug:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, manager, employee]
        status:
          type: string
          enum: [active, disabled]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PlatformUpdateUserRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [active, disabled]

    PlatformSubscription:
      type: object
      required: [id, tenant_id, tenant_name, tenant_slug, plan, status, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        tenant_name:
          type: string
        tenant_slug:
          type: string
        plan:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PlatformUpdateSubscriptionRequest:
      type: object
      description: PATCH semantics — only provided fields change.
      properties:
        plan:
          type: string
        status:
          type: string

    PlatformSystemHealth:
      type: object
      required: [control_plane, tenants_by_status]
      properties:
        control_plane:
          type: string
          enum: [ok]
        tenants_by_status:
          type: object
          additionalProperties:
            type: integer

    SuperAdminAuditEvent:
      type: object
      required: [id, actor_platform_user_id, actor_email, action, target_type, metadata, created_at]
      properties:
        id:
          type: string
          format: uuid
        actor_platform_user_id:
          type: string
          format: uuid
        actor_email:
          type: string
          format: email
        action:
          type: string
        target_type:
          type: string
        target_id:
          type: string
          format: uuid
          nullable: true
        tenant_id:
          type: string
          format: uuid
          nullable: true
        tenant_name:
          type: string
          nullable: true
        tenant_slug:
          type: string
          nullable: true
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time

    Department:
      type: object
      required: [id, name, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        parent_id:
          type: string
          format: uuid
          nullable: true
        description:
          type: string
          nullable: true
        lead_employee_id:
          type: string
          format: uuid
          nullable: true
          description: The employee who leads this department, if set.
        icon:
          type: string
          nullable: true
          description: Icon key for UI (e.g. route, briefcase).
        color:
          type: string
          nullable: true
