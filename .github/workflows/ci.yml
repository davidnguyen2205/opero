name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          # Enable caching after the first `go mod tidy` produces go.sum.
          cache: false

      - name: gofmt
        run: test -z "$(gofmt -l .)" || { echo 'Run gofmt -w .'; gofmt -l .; exit 1; }

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          working-directory: backend
          # Pin to the exact v2 version that passes locally. The repo's
          # .golangci.yml is v2-format ("version: 2"), which golangci-lint v1
          # cannot parse — and action@v6 installs v1. action@v7 + a v2 version
          # is required.
          version: v2.12.2

      - name: test
        run: go test ./...
